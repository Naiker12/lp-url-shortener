name: Deploy shortener lambda

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/lp-shortener.yml"
      - "src/**"
      - "requirements.txt"
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  LAMBDA_SHORTENER_FUNCTION: lp-url-shortener-dev-shorten

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          rm -rf package function.zip
          mkdir package
          pip install -r requirements.txt -t package
          cp -R src/. package/
          cd package
          zip -r ../function.zip .

      - name: Validate AWS secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          test -n "$AWS_ACCESS_KEY_ID" || (echo "Missing repository secret AWS_ACCESS_KEY_ID" && exit 1)
          test -n "$AWS_SECRET_ACCESS_KEY" || (echo "Missing repository secret AWS_SECRET_ACCESS_KEY" && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Lambda code
        run: aws lambda update-function-code --function-name "${{ env.LAMBDA_SHORTENER_FUNCTION }}" --zip-file fileb://function.zip
